# Mesh and weather files
max_volume_path:             "Path\\to\\maxVolume.ply"            # PLY of the full volume envelope
test_surface_path:     "Path\\to\\insolationSrfs.ply"       # PLY of surfaces to sample. Each surface must be a single flat panel. Explode polysurfaces (e.g. extruded block boundaries) into individual faces in GH before exporting.
epw_path:                    "Path\\to\\weather.epw"              # Weather data file

# Output
out_dir:                     "Path\\to\\outputs"                  # Where carved meshes go
final_mesh_format: ply        # Final mesh format. One of {'ply','obj','stl','glb'}
# Carving Mode: {'time-based','irradiance','benefit','daylight','tilted_plane','radiative_cooling [experimental]'}
mode:           'benefit'

# Analysis period (usually heating season for benefit mode, only a handful of hours of a specific day for time-based mode)
start_month:    10
start_day:      15
start_hour:     7
end_month:      4
end_day:        15
end_hour:       19

# Dew point settings for radiative cooling
dew_point_celsius: 14.0    # Night-time dew-point in °C for radiative_cooling.
bliss_k:          1.8      # Empirical angular attenuation constant for radiative_cooling.

# Sky model parameters
north_deg: 0.0             # North direction in degrees clockwise from Y-axis (0 = Y-up is north)
ground_reflectance: 0.2    # Ground surface reflectance for sky model (0-1)

# Voxel grid and sampling
voxel_size:     1.0    # length of cube edge
grid_step:      1.0    # spacing between sample points
ray_length:     300.0  # max ray cast distance
min_altitude:   5.0    # ignore low sun angles
margin_frac:    0.01   # extra margin around mesh
ray_batch_size: 0  # 0 = auto-tune based on GPU VRAM

# Cleanup and smoothing
apply_smoothing: false # apply smoothing? False returns the raw carved mesh
min_voxels:     300    # drop tiny clusters
min_face_count: 100    # drop small fragments
smooth_iters:   2     # number of smoothing iterations

# Column post-processing (applied after thresholding, before mesh export)
# Carves all occupied voxels above the lowest sufficiently-carved region
# in each (x, y) column.  Removes structurally implausible floating mass.
carve_above: false                # Enable column carve-above post-processing
carve_above_min_consecutive: 1    # Min consecutive carved voxels to trigger (2-3 recommended)

# Score smoothing (pre-threshold Gaussian blur on the score volume)
# Smooths resolution-dependent noise so the carved mesh is cleaner at fine voxel sizes.
# null (default) = auto: 1.1× voxel_size — recommended for most runs.
# 0    = disabled (no smoothing).
# >0   = explicit radius in meters. Rule of thumb: 1.0–1.2× voxel_size.
#         Over-smoothing (>2× voxel_size) rounds features excessively.
# Only affects weighted-score modes (irradiance, benefit, daylight, radiative_cooling).
# Violation-count modes (time-based, tilted_plane) are unaffected.
score_smoothing: null

# Thresholding and scoring for weighted carving
threshold: 'carve_fraction'  # 'headtail', 'carve_fraction', or a numeric value. For time-based/tilted_plane, use an integer (violation count).
carve_fraction: 0.7

# Benefit mode settings (used when mode: benefit)
balance_temperature: 20.0      # °C, for benefit mode
balance_offset:      2.0       # °C, for benefit mode


# Diagnostics and devices
diagnostics: true   # write extra exports
diagnostic_plots: false  # Generate diagnostic plot images (histograms, sky patches).
                         # Rendered in a background thread — does not block the pipeline.
                         # false (default) = JSON diagnostics only, no matplotlib overhead.
device: 'auto'      # 'auto', 'cpu', or 'cuda'

# Plane-method angle spec used only when mode: tilted_plane
# Provide either a single number, or an 8-length list in the order [N, NE, E, SE, S, SW, W, NW]
tilted_plane_angle_deg: 45.0 # or something like [30, 27, 24, 24, 27, 30, 30, 27]

