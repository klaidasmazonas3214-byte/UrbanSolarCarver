# UrbanSolarCarver — Time-based mode
# Classic solar envelope: carves voxels that cast shadows on test surfaces
# during the specified hours. Binary carving (shadow / no shadow).
# Typical use: solar access guarantees for a specific date and time window.

# --- Required paths ---
max_volume_path:    "path/to/maxVolume.ply"
test_surface_path:  "path/to/testSurfaces.ply"
epw_path:           "path/to/weather.epw"
out_dir:            "path/to/output"

mode: time-based

# Analysis period — usually a single day or narrow window
# Example: winter solstice, 10 AM – 2 PM
start_month: 12
start_day:   21
start_hour:  10
end_month:   12
end_day:     21
end_hour:    14

# Grid
voxel_size: 1.0

# --- Threshold ---
# time-based scores are violation COUNTS (integer: how many time steps in the
# analysis period a voxel casts a shadow on the test surfaces). Use a
# non-negative integer:
#   threshold: 0   — strict: keep only voxels that NEVER shadow test surfaces (default)
#   threshold: 1   — allow shadow in at most 1 time step
#   threshold: 2   — allow shadow in at most 2 time steps
# The right value depends on how many time steps the period contains.
# Do NOT use string methods (otsu/headtail/carve_fraction) — they are not
# meaningful for integer violation counts and will raise an error.
# threshold: 0    # uncomment to set explicitly; None uses the strict default (0)

# -- Defaults you may want to override ----------------------------------------
# voxel_size:      1.0    # voxel edge in metres (0.5 = 8x more voxels)
# grid_step:       1.0    # test-surface sampling spacing in metres
# ray_length:      300.0  # max ray distance in metres
# threshold:       None   # integer: 0 = strict (no violations), 1 = allow 1, etc.
# min_altitude:    5.0    # ignore sun below this elevation (degrees)
# apply_smoothing: false  # true = SDF smooth + marching cubes
# device:          'auto' # 'auto', 'cpu', or 'cuda'
# See REFERENCE_all_options.yaml for the complete parameter list.
